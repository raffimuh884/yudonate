{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Donate</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS TERPISAH -->
    <link rel="stylesheet" href="{% static 'accounts/css/form.css' %}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

    <!-- LOGO (BISA DIKLIK KE HOME) -->
    <a href="{% url 'home' %}" class="logo">AyoDonate</a>

</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4">Donate Now</h2>

    <div class="card donate-card p-4 shadow">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Name</label>
                {{ form.name }}
            </div>

            <div class="mb-3">
                <label class="form-label">Campaign</label>
                {{ form.campaign }}
            </div>

            <div class="mb-3">
                <label class="form-label">Amount</label>
                {{ form.amount }}
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn-donate">
                Donate
            </button>

        </form>

    </div>

</div>

</body>
</html>
